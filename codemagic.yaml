workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
      - cd build/ios/iphoneos
      - mkdir Payload
      - mv Runner.app Payload
      - zip -r app.ipa Payload

    artifacts:
      - build/ios/iphoneos/app.ipa