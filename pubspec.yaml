name: moofid_mobile
description: "A new Flutter companion app for Moofid Installments."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  uuid: ^4.5.3
  intl: ^0.20.2
  url_launcher: ^6.3.2
  pdf: ^3.12.0
  printing: ^5.14.3
  http: ^1.2.1
  nsd: ^5.0.1
  mobile_scanner: ^5.2.1
  shared_preferences: ^2.3.2
  vibration: any
  signalr_netcore: ^1.3.1
  excel: ^4.0.5
  share_plus: ^10.1.0
  file_picker: ^11.0.2
  device_info_plus: ^11.5.0
  crypto: ^3.0.7
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo_small.png

  # Add fonts below once downloaded
  # fonts:
  #   - family: BeVietnamPro
  #     fonts:
  #       - asset: assets/fonts/BeVietnamPro-Bold.ttf
  #       - asset: assets/fonts/BeVietnamPro-Medium.ttf
  #   - family: PlusJakartaSans
  #     fonts:
  #       - asset: assets/fonts/PlusJakartaSans-Regular.ttf
  #       - asset: assets/fonts/PlusJakartaSans-Bold.ttf
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo_small.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    image: assets/logo_small.png
    color: "#ffffff"
  web: false